<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="utf-8"/>
    <meta content="width=device-width, initial-scale=1.0" name="viewport"/>
    <title>Topper Thali - Student Dashboard</title>
    <script src="https://cdn.tailwindcss.com?plugins=forms,container-queries"></script>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/qrcodejs/1.0.0/qrcode.min.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet"/>
    <link href="https://fonts.googleapis.com/css2?family=Material+Symbols+Outlined:wght,FILL@100..700,0..1&display=swap" rel="stylesheet"/>
    
    <script id="tailwind-config">
        tailwind.config = {
            darkMode: "class",
            theme: {
                extend: {
                    colors: {
                        "primary": "#0D47A1",
                        "background-light": "#FAFAFC",
                        "surface": "#FFFFFF",
                        "text-main": "#1A1B1E",
                        "muted": "#868E96",
                        "accent": "#2ECC71"
                    },
                    borderRadius: { "DEFAULT": "1rem", "2xl": "24px" }
                }
            }
        }
    </script>

    <style>
        body { font-family: 'Manrope', sans-serif; background-color: #FAFAFC; -webkit-tap-highlight-color: transparent; }
        .header-gradient { background: linear-gradient(180deg, rgba(13, 71, 161, 0.1) 0%, rgba(13, 71, 161, 0) 150px); }
        .hide-scrollbar::-webkit-scrollbar { display: none; }
        .backdrop-blur-custom { backdrop-filter: blur(4px); -webkit-backdrop-filter: blur(4px); }
        #qrcode img { margin: 0 auto; } /* Center the generated QR */
    </style>
</head>

<body class="text-text-main h-screen overflow-hidden flex flex-col relative">

    <div class="flex-1 overflow-y-auto pb-24 header-gradient">
        <header class="px-6 pt-12 pb-4 flex justify-between items-center relative z-10">
            <div>
                <h1 id="student-name" class="text-[28px] font-extrabold tracking-tight leading-tight">Welcome Back!</h1>
            </div>
            <button class="w-12 h-12 rounded-full bg-primary flex items-center justify-center text-white shadow-lg active:scale-95 transition" onclick="openQR()">
                <span class="material-symbols-outlined text-[24px]">qr_code_2</span>
            </button>
        </header>

        <div class="px-6 mb-6">
            <div class="bg-primary p-6 rounded-2xl text-white shadow-xl">
                <p class="text-sm opacity-80 font-medium">Remaining Credits</p>
                <div class="flex items-baseline gap-2">
                    <h2 id="student-credits" class="text-4xl font-black">--</h2>
                    <span class="text-lg opacity-90">Days Left</span>
                </div>
            </div>
        </div>

        <div class="px-6 space-y-4">
            <h3 class="text-sm font-bold text-muted uppercase tracking-widest px-1">Today's Meals</h3>
            
            <div class="bg-surface rounded-2xl p-5 shadow-sm border border-gray-100" id="lunch-card">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold" id="lunch-title">Lunch</h2>
                        <p class="text-sm text-muted font-medium mt-1">12:30 PM - 2:30 PM</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-accent uppercase" id="lunch-status">Eating</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input checked class="sr-only peer" onchange="toggleMeal(this, 'lunch')" type="checkbox"/>
                            <div class="w-12 h-6 bg-muted rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-accent"></div>
                        </label>
                    </div>
                </div>
            </div>

            <div class="bg-surface rounded-2xl p-5 shadow-sm border border-gray-100" id="dinner-card">
                <div class="flex justify-between items-start">
                    <div>
                        <h2 class="text-xl font-bold" id="dinner-title">Dinner</h2>
                        <p class="text-sm text-muted font-medium mt-1">7:30 PM - 9:30 PM</p>
                    </div>
                    <div class="flex items-center gap-2">
                        <span class="text-xs font-bold text-accent uppercase" id="dinner-status">Eating</span>
                        <label class="relative inline-flex items-center cursor-pointer">
                            <input checked class="sr-only peer" onchange="toggleMeal(this, 'dinner')" type="checkbox"/>
                            <div class="w-12 h-6 bg-muted rounded-full peer peer-checked:after:translate-x-full after:content-[''] after:absolute after:top-[2px] after:left-[2px] after:bg-white after:rounded-full after:h-5 after:w-5 after:transition-all peer-checked:bg-accent"></div>
                        </label>
                    </div>
                </div>
            </div>
        </div>
    </div>

    <div class="fixed bottom-0 left-0 w-full z-20 bg-surface border-t border-gray-100 px-6 py-3 flex justify-around shadow-lg">
        <div class="flex flex-col items-center text-primary">
            <span class="material-symbols-outlined">home</span>
            <span class="text-[10px] font-bold mt-1">Home</span>
        </div>
        <div class="flex flex-col items-center text-muted opacity-60">
            <span class="material-symbols-outlined">history</span>
            <span class="text-[10px] font-bold mt-1">History</span>
        </div>
        <div class="flex flex-col items-center text-muted opacity-60">
            <span class="material-symbols-outlined">account_circle</span>
            <span class="text-[10px] font-bold mt-1">Profile</span>
        </div>
    </div>

    <div class="fixed inset-0 bg-black/60 backdrop-blur-custom z-40 opacity-0 pointer-events-none transition-opacity duration-300" id="modal-backdrop" onclick="closeQR()"></div>
    
    <div class="fixed bottom-0 left-0 w-full bg-surface rounded-t-3xl z-50 transform translate-y-full transition-all duration-500 flex flex-col items-center pt-3 pb-12 px-6" id="qr-modal">
        <div class="w-12 h-1.5 bg-gray-200 rounded-full mb-8"></div>
        <h3 class="text-2xl font-black mb-1">Scan to Enter</h3>
        <p id="student-id-display" class="text-sm text-muted mb-8">ID: --</p>
        
        <div class="relative p-4 bg-white rounded-3xl shadow-2xl border-4 border-primary/10 mb-8">
            <div id="qrcode"></div> </div>

        <button onclick="closeQR()" class="w-full py-4 bg-gray-100 rounded-2xl font-bold text-text-main active:scale-95 transition">Close</button>
    </div>

    <script>
        let qrcodeInstance = null;

        // 1. Function called by Android to set student data
        function updateStudentInfo(name, credits, qrData) {
            document.getElementById("student-name").innerHTML = "Good Morning, <br/>" + name + ".";
            document.getElementById("student-credits").innerText = credits;
            document.getElementById("student-id-display").innerText = "ID: " + qrData.substring(0, 8).toUpperCase();
            
            // Pre-generate QR
            if (!qrcodeInstance) {
                qrcodeInstance = new QRCode(document.getElementById("qrcode"), {
                    text: qrData,
                    width: 220,
                    height: 220,
                    colorDark : "#1A1B1E",
                    colorLight : "#ffffff"
                });
            }
        }

        // 2. UI Logic for Modal
        function openQR() {
            document.getElementById('qr-modal').classList.remove('translate-y-full');
            document.getElementById('modal-backdrop').classList.replace('opacity-0', 'opacity-100');
            document.getElementById('modal-backdrop').classList.remove('pointer-events-none');
        }

        function closeQR() {
            document.getElementById('qr-modal').classList.add('translate-y-full');
            document.getElementById('modal-backdrop').classList.replace('opacity-100', 'opacity-0');
            document.getElementById('modal-backdrop').classList.add('pointer-events-none');
        }

        // 3. Logic to notify Android of Meal Skips
        function toggleMeal(checkbox, mealType) {
            const status = document.getElementById(`${mealType}-status`);
            const title = document.getElementById(`${mealType}-title`);
            
            if (window.AndroidInterface) {
                window.AndroidInterface.onMealToggle(mealType, checkbox.checked);
            }

            if (checkbox.checked) {
                status.textContent = 'Eating';
                status.classList.replace('text-muted', 'text-accent');
                title.classList.remove('line-through', 'text-muted');
            } else {
                status.textContent = 'Skipped';
                status.classList.replace('text-accent', 'text-muted');
                title.classList.add('line-through', 'text-muted');
            }
        }
    </script>
</body>
</html>
